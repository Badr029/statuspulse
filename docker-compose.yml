services:

#the database service
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    networks:
      - statuspulse-network

# The API service 
  api:
    build: ./api
    restart: unless-stopped
    environment:
      PORT: ${PORT}
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: development  
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      ALERT_FROM_EMAIL: ${ALERT_FROM_EMAIL}
      ALERT_TO_EMAIL: ${ALERT_TO_EMAIL}
      
    ports:
      - "3000:3000"

    volumes:
      - ./api:/app 
      - /app/node_modules

    depends_on:
      - db
    networks:
      - statuspulse-network

    command: npm run dev 


# The worker service
  worker:
    build: ./worker
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: development
    depends_on:
      - db
    networks:
      - statuspulse-network

volumes:
  postgres_data:

networks:
  statuspulse-network: