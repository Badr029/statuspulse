services:

  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - statuspulse-network

  api:
    build: ./api
    restart: unless-stopped
    environment:
      PORT: ${PORT}
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "3000:3000"
    depends_on:
      - db
    networks:
      - statuspulse-network

  worker:
    build: ./worker
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
    depends_on:
      - db
    networks:
      - statuspulse-network

volumes:
  postgres_data:

networks:
  statuspulse-network: