name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

#JOB 1: Jest Unit & integration Tests

  jest-tests:
    name: Jest Unit & integration Tests
    runs-on: ubuntu-latest
    services:
      test_db:
        image: postgres:15
        env:
          POSTGRES_USER: statuspulse
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: statuspulse_test_db
        ports:
          - "5433:5432"
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install root test dependencies
        run: npm ci

      - name: Install API dependencies
        run: |
          cd api
          npm ci

      - name: Install Worker dependencies
        run: |
          cd worker
          npm ci

      - name: Apply database migrations
        run: |
          psql -h localhost -p 5433 -U statuspulse -d statuspulse_test_db -f db/migrations/001_initial_schema.sql
          psql -h localhost -p 5433 -U statuspulse -d statuspulse_test_db -f db/migrations/002_add_users.sql
        env:
          PGPASSWORD: testpassword

      - name: Run tests
        run: npm test
        env:
          DATABASE_URL: postgres://statuspulse:testpassword@localhost:5433/statuspulse_test_db
          NODE_ENV: test
          SENDGRID_API_KEY: ""
          ALERT_FROM_EMAIL: ""
          ALERT_TO_EMAIL: ""

#JOB 2: Docker Build Checkout

  docker-build:
    name: Docker Build Checkout
    runs-on: ubuntu-latest
    needs: jest-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
  
      - name: Docker build
        uses: docker/setup-buildx-action@v3
  
      - name: Docker API image build 
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
  
      - name: Docker Worker image build
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Docker Frontend image build
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

#JOB 3: Java Selenium E2E Tests 

  e2e-tests:
    name: Java Selenium E2E Tests
    runs-on: ubuntu-latest
    needs: [jest-tests , docker-build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Docker Compose
        run: docker compose version

      - name: Create .env file for docker-compose
        run: |
          cat > .env << 'EOF'
          POSTGRES_USER=statuspulse
          POSTGRES_PASSWORD=localdevpassword
          POSTGRES_DB=statuspulse_db
          PORT=3000
          DATABASE_URL=postgresql://statuspulse:localdevpassword@db:5432/statuspulse_db
          SENDGRID_API_KEY=${{ secrets.SENDGRID_API_KEY }}
          ALERT_FROM_EMAIL=${{ secrets.ALERT_FROM_EMAIL }}
          ALERT_TO_EMAIL=${{ secrets.ALERT_TO_EMAIL }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          EOF

      - name: Start full stack with Docker Compose
        run: docker compose up -d --build --wait
        timeout-minutes: 5

      - name: Wait for frontend to be ready
        run: |
          echo "Waiting for frontend..."
          for i in {1..30}; do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:5173 | grep -q "200\|304"; then
              echo "Frontend is ready"
              exit 0
            fi
            echo "Attempt $i/30 - not ready yet, waiting 5 seconds..."
            sleep 5
          done
          echo "Frontend failed to start after 150 seconds"
          docker compose logs frontend
          exit 1

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('tests/e2e/pom.xml') }}  
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run E2E Tests
        run: mvn test -f tests/e2e/pom.xml
        env:
          CI: true

      - name: Upload E2E test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-reports
          path: |
            tests/e2e/reports/
            tests/e2e/screenshots/
            tests/e2e/test-output/
          retention-days: 7
        
      - name: Stop Docker Compose
        if: always()
        run: docker compose down -v
